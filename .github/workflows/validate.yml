name: 校验清单

# PR 门禁：改动 README 时，校验条目格式（不合格拦下）+ 链接存活/去重（软警告）。
on:
  pull_request:
    paths: ["README.md"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 校验作品清单格式与链接
        run: python .github/scripts/validate_list.py
